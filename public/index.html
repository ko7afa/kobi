<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كوبي — اللعبة الليبية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a4731;
  --green-light: #246040;
  --green-felt: #1e5438;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --cream: #f5f0e8;
  --card-red: #c0392b;
  --card-black: #1a1a2e;
  --text-light: #f0ebe0;
  --text-muted: #a09070;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --card-shadow: 0 4px 12px rgba(0,0,0,0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Tajawal', sans-serif;
  background: #0d2b1d;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(26,71,49,0.8) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(36,96,64,0.5) 0%, transparent 50%),
    repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
  min-height: 100vh;
  color: var(--text-light);
  overflow-x: hidden;
}

/* ══════════════════════════════
   SCREENS
══════════════════════════════ */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ══════════════════════════════
   LOBBY SCREEN
══════════════════════════════ */
#lobby {
  padding: 2rem 1rem;
  gap: 2rem;
}

.logo {
  text-align: center;
}

.logo h1 {
  font-family: 'Cairo', sans-serif;
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.5), 0 4px 8px rgba(0,0,0,0.5);
  letter-spacing: -1px;
  line-height: 1;
}

.logo .subtitle {
  font-size: 1rem;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.cards-deco {
  display: flex;
  gap: -8px;
  justify-content: center;
  margin: 0.5rem 0;
}

.deco-card {
  width: 36px; height: 52px;
  background: var(--cream);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: var(--card-shadow);
  transform: rotate(var(--rot));
  margin: 0 -4px;
  border: 0.5px solid rgba(0,0,0,0.1);
}

.lobby-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 2rem;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
}

.lobby-card h2 {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 1.2rem;
  text-align: center;
}

.input-group {
  margin-bottom: 1rem;
}

.input-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.input-group input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 10px;
  color: var(--text-light);
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: var(--gold);
}

.input-group input::placeholder { color: rgba(255,255,255,0.25); }

.btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #a8782a);
  color: #1a1a0a;
  box-shadow: 0 4px 16px rgba(201,168,76,0.3);
}

.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
.btn-gold:active { transform: translateY(0); }

.btn-outline {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold-light);
}
.btn-outline:hover { background: rgba(201,168,76,0.1); }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 1.2rem 0;
  color: var(--text-muted); font-size: 0.85rem;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: rgba(255,255,255,0.1);
}

/* ══════════════════════════════
   WAITING ROOM
══════════════════════════════ */
#waiting {
  padding: 2rem 1rem;
  gap: 1.5rem;
}

.waiting-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 2rem;
  width: 100%;
  max-width: 480px;
  text-align: center;
}

.room-id-display {
  font-family: 'Cairo', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
  margin: 1rem 0;
}

.players-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 1.5rem 0;
}

.player-slot {
  background: rgba(0,0,0,0.2);
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 14px;
  font-size: 0.9rem;
  color: var(--text-muted);
  transition: all 0.3s;
}

.player-slot.filled {
  background: rgba(26,71,49,0.5);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--text-light);
  font-weight: 600;
}

.player-slot.bot-slot {
  background: rgba(60,52,137,0.3);
  border: 1px solid rgba(83,74,183,0.4);
  color: #a89fe8;
  font-weight: 600;
}

.player-slot .slot-icon { font-size: 1.5rem; margin-bottom: 4px; }

.start-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3C3489, #534AB7);
  color: #EEEDFE;
  border: none;
  border-radius: 10px;
  font-family: 'Tajawal', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(60,52,137,0.4);
}
.start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(60,52,137,0.5); }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.bot-notice {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding: 6px;
  background: rgba(60,52,137,0.15);
  border-radius: 8px;
  border: 1px solid rgba(83,74,183,0.2);
}

.whatsapp-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: #25D366;
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  padding: 13px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  width: 100%;
  text-decoration: none;
  transition: all 0.2s;
}
.whatsapp-btn:hover { background: #128C7E; transform: translateY(-1px); }
.whatsapp-btn svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

/* ══════════════════════════════
   GAME SCREEN
══════════════════════════════ */
#game {
  padding: 0;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  justify-content: flex-start;
  min-height: 100vh;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  width: 100%;
}

.game-title {
  font-family: 'Cairo', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--gold);
}

.lafa-badge {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.85rem;
  color: var(--gold-light);
}

/* Scores Bar */
.scores-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 10px 12px;
  width: 100%;
}

.score-chip {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 7px 6px;
  text-align: center;
  position: relative;
  transition: all 0.3s;
}

.score-chip.my-chip {
  border-color: rgba(201,168,76,0.35);
  background: rgba(26,71,49,0.4);
}

.score-chip.current-turn {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
}

.score-chip .chip-name {
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.score-chip .chip-pts {
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.2;
}

.score-chip .chip-pts.positive { color: var(--gold-light); }
.score-chip .chip-pts.negative { color: #e74c3c; }

.score-chip .chip-bid {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.majira-alert {
  position: absolute;
  top: -36px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #8B0000, #c0392b);
  color: white;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  box-shadow: 0 2px 10px rgba(192,57,43,0.5);
  z-index: 100;
  animation: bounce 0.5s ease;
}

@keyframes bounce {
  0% { transform: translateX(-50%) scale(0.5); opacity:0; }
  60% { transform: translateX(-50%) scale(1.1); }
  100% { transform: translateX(-50%) scale(1); opacity:1; }
}

/* Table / Felt */
.felt-area {
  background: var(--green-felt);
  background-image:
    radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 20px, rgba(0,0,0,0.03) 20px, rgba(0,0,0,0.03) 21px),
    repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(0,0,0,0.03) 20px, rgba(0,0,0,0.03) 21px);
  border-radius: 16px;
  margin: 0 12px 10px;
  padding: 16px 12px;
  border: 2px solid rgba(201,168,76,0.2);
  box-shadow: inset 0 2px 20px rgba(0,0,0,0.3);
  position: relative;
}

.felt-label {
  text-align: center;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.played-cards {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: flex-end;
  min-height: 90px;
  flex-wrap: wrap;
}

.played-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.played-slot .slot-name {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.5);
}

.played-slot.winner-slot .card-el {
  box-shadow: 0 0 20px rgba(201,168,76,0.7), 0 4px 12px rgba(0,0,0,0.4);
  transform: translateY(-4px) scale(1.05);
}

/* Cards */
.card-el {
  width: 54px;
  height: 76px;
  background: linear-gradient(160deg, #fdfdf5, #f0ead8);
  border-radius: 7px;
  border: 0.5px solid rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 4px 5px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: var(--card-shadow);
  font-weight: 600;
  position: relative;
}

.card-el:hover { transform: translateY(-6px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
.card-el.no-hover:hover { transform: none; cursor: default; }
.card-el.disabled { opacity: 0.4; cursor: not-allowed; }
.card-el.disabled:hover { transform: none; box-shadow: var(--card-shadow); }

.card-el .c-rank { font-size: 13px; line-height: 1; align-self: flex-start; }
.card-el .c-suit { font-size: 20px; line-height: 1; }
.card-el .c-rank-b { font-size: 13px; line-height: 1; align-self: flex-end; transform: rotate(180deg); }

.card-el.red { color: var(--card-red); }
.card-el.black { color: var(--card-black); }

.card-el.back {
  background: linear-gradient(135deg, #1a1a6e, #2d2d8f, #1a1a6e);
  border: 0.5px solid #4444aa;
  cursor: default;
}

.card-el.heart-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 7px;
  border: 2px solid rgba(192,57,43,0.4);
  pointer-events: none;
}

/* Event Messages */
.event-msg {
  text-align: center;
  padding: 6px 12px;
  margin: 0 12px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  min-height: 28px;
  transition: all 0.3s;
}

.event-msg.majira {
  background: linear-gradient(135deg, rgba(139,0,0,0.4), rgba(192,57,43,0.3));
  border: 1px solid rgba(192,57,43,0.4);
  color: #ff8080;
  animation: flash 0.5s ease;
}

@keyframes flash {
  0%,100%{opacity:1} 50%{opacity:0.5}
}

/* Player Hand */
.hand-area {
  padding: 8px 12px;
}

.hand-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 8px;
}

.player-hand {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
}

/* Action msg */
.action-msg {
  text-align: center;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.6);
  padding: 4px 12px;
  min-height: 22px;
}

/* Bid Panel */
.bid-panel {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 16px;
  padding: 16px;
  margin: 0 12px;
  text-align: center;
  display: none;
}

.bid-panel.visible { display: block; }

.bid-panel h3 {
  font-size: 1rem;
  color: var(--gold-light);
  margin-bottom: 12px;
}

.bid-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.bid-btn {
  width: 52px; height: 52px;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 10px;
  color: var(--gold-light);
  font-family: 'Cairo', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.bid-btn:hover {
  background: rgba(201,168,76,0.25);
  transform: translateY(-2px);
}

/* Summary Panel */
.summary-panel {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 16px;
  padding: 1.5rem;
  margin: 0 12px;
  display: none;
}

.summary-panel.visible { display: block; }

.summary-panel h3 {
  text-align: center;
  color: var(--gold);
  font-size: 1.2rem;
  margin-bottom: 12px;
}

.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 0.9rem;
}

.sum-row:last-child { border: none; }

.sum-delta.pos { color: #4ade80; font-weight: 700; }
.sum-delta.neg { color: #f87171; font-weight: 700; }

.game-over-banner {
  text-align: center;
  margin-top: 12px;
  padding: 12px;
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border-radius: 10px;
  border: 1px solid rgba(201,168,76,0.3);
}

.game-over-banner h2 {
  color: var(--gold);
  font-size: 1.4rem;
  margin-bottom: 4px;
}

.next-btn {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  background: linear-gradient(135deg, var(--gold), #a8782a);
  color: #1a1a0a;
  border: none;
  border-radius: 10px;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Waiting indicator */
.waiting-dots span {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  margin: 0 3px;
  animation: dot 1.4s ease-in-out infinite;
}
.waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
.waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{transform:scale(0);opacity:0.3} 40%{transform:scale(1);opacity:1} }

/* Trick result toast */
.trick-toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold-light);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.95rem;
  font-weight: 600;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.trick-toast.visible { opacity: 1; }

/* Connection status */
.conn-status {
  position: fixed;
  bottom: 12px;
  left: 12px;
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}

.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #e74c3c;
  transition: background 0.3s;
}
.conn-dot.connected { background: #2ecc71; }

/* Error toast */
.error-toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(192,57,43,0.9);
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 0.9rem;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.error-toast.visible { opacity: 1; }

/* Next trick btn */
.next-trick-btn {
  display: none;
  margin: 8px auto;
  padding: 9px 24px;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 20px;
  color: var(--gold-light);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.15s;
}
.next-trick-btn.visible { display: block; }
.next-trick-btn:hover { background: rgba(201,168,76,0.25); }

@media (max-width: 480px) {
  .card-el { width: 46px; height: 65px; }
  .card-el .c-suit { font-size: 17px; }
  .scores-bar { gap: 4px; }
  .score-chip .chip-pts { font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- ════════════════════════════
     LOBBY SCREEN
════════════════════════════ -->
<div id="lobby" class="screen active">
  <div class="logo">
    <div class="cards-deco">
      <div class="deco-card" style="--rot:-12deg">♠</div>
      <div class="deco-card" style="--rot:-5deg; color:#c0392b">♥</div>
      <div class="deco-card" style="--rot:5deg; color:#c0392b">♦</div>
      <div class="deco-card" style="--rot:12deg">♣</div>
    </div>
    <h1>كوبي</h1>
    <div class="subtitle">اللعبة الليبية الأصيلة</div>
  </div>

  <div class="lobby-card">
    <h2>ادخل اسمك</h2>
    <div class="input-group">
      <label>اسمك في اللعبة</label>
      <input type="text" id="player-name" placeholder="اكتب اسمك..." maxlength="20" />
    </div>

    <button class="btn btn-gold" onclick="createRoom()">أنشئ غرفة جديدة</button>

    <div class="divider">أو انضم لغرفة</div>

    <div class="input-group">
      <label>كود الغرفة</label>
      <input type="text" id="room-code" placeholder="مثال: AB12CD34" maxlength="8" style="text-align:center;letter-spacing:4px;text-transform:uppercase;" />
    </div>
    <button class="btn btn-outline" onclick="joinRoom()">انضم للغرفة</button>
  </div>
</div>

<!-- ════════════════════════════
     WAITING ROOM
════════════════════════════ -->
<div id="waiting" class="screen">
  <div style="text-align:center;">
    <div style="font-size:2rem; margin-bottom:4px;">🃏</div>
    <h2 style="font-family:'Cairo',sans-serif; font-size:1.8rem; color:var(--gold);">غرفة الانتظار</h2>
  </div>

  <div class="waiting-card">
    <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:4px;">كود الغرفة</div>
    <div class="room-id-display" id="display-room-id">——</div>

    <div class="players-grid" id="waiting-players"></div>

    <div style="color:var(--text-muted); font-size:0.85rem; margin-bottom:12px; text-align:center;">
      <span class="waiting-dots"><span></span><span></span><span></span></span>
      انضم <span id="waiting-count">1</span>/4 لاعبين
    </div>

    <!-- زر البدء — يظهر فقط للمضيف -->
    <div id="host-controls" style="display:none;">
      <div class="bot-notice" id="bot-notice">🤖 المقاعد الفارغة سيملأها بوتات تلقائياً</div>
      <button class="start-btn" id="start-btn" onclick="sendStartGame()">▶ ابدأ اللعبة</button>
    </div>

    <a id="whatsapp-link" href="#" class="whatsapp-btn" target="_blank">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      شارك الرابط عبر واتساب
    </a>
  </div>
</div>

<!-- ════════════════════════════
     GAME SCREEN
════════════════════════════ -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="game-title">🃏 كوبي</div>
    <div class="lafa-badge" id="lafa-badge">اللفة 1</div>
    <div style="font-size:0.8rem; color:var(--text-muted);" id="phase-badge">—</div>
  </div>

  <div class="scores-bar" id="scores-bar"></div>

  <div class="felt-area">
    <div class="felt-label">الطاولة</div>
    <div class="played-cards" id="played-cards"></div>
  </div>

  <div class="event-msg" id="event-msg"></div>

  <div class="bid-panel" id="bid-panel">
    <h3 id="bid-title">اختر طلبك</h3>
    <div class="bid-buttons" id="bid-buttons"></div>
  </div>

  <div class="summary-panel" id="summary-panel">
    <h3>نتائج اللفة</h3>
    <div id="summary-rows"></div>
    <div id="game-over-area"></div>
    <button class="next-btn" id="next-round-btn" onclick="sendNextRound()">اللفة التالية</button>
  </div>

  <button class="next-trick-btn" id="next-trick-btn" onclick="sendNextTrick()">الدار التالية ◄</button>

  <div class="action-msg" id="action-msg">جاري الاتصال...</div>

  <div class="hand-area">
    <div class="hand-label">أوراقك</div>
    <div class="player-hand" id="player-hand"></div>
  </div>
</div>

<!-- Toasts -->
<div class="trick-toast" id="trick-toast"></div>
<div class="error-toast" id="error-toast"></div>
<div class="conn-status">
  <div class="conn-dot" id="conn-dot"></div>
  <span id="conn-label">غير متصل</span>
</div>

<script>
// ─── State ───
let ws = null;
let myPlayerId = localStorage.getItem('kobi_pid') || null;
let myRoomId = null;
let myIndex = -1;
let lastState = null;
let majiraTimers = {};

const HOST = window.location.hostname === 'localhost' ? 'ws://localhost:3000' : `wss://${window.location.host}`;

// ─── Init ───
window.addEventListener('load', () => {
  // Check if joining via URL
  const params = new URLSearchParams(window.location.search);
  const roomParam = params.get('room');
  if (roomParam) {
    document.getElementById('room-code').value = roomParam.toUpperCase();
    showScreen('lobby');
  }
  connectWS();
});

function connectWS() {
  ws = new WebSocket(HOST);

  ws.onopen = () => {
    setConnStatus(true);
  };

  ws.onclose = () => {
    setConnStatus(false);
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => setConnStatus(false);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function setConnStatus(ok) {
  document.getElementById('conn-dot').className = 'conn-dot' + (ok ? ' connected' : '');
  document.getElementById('conn-label').textContent = ok ? 'متصل' : 'جاري الاتصال...';
}

function send(obj) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

// ─── Message Handler ───
function handleMessage(msg) {
  switch (msg.type) {
    case 'roomCreated':
      myPlayerId = msg.playerId;
      myRoomId = msg.roomId;
      localStorage.setItem('kobi_pid', myPlayerId);
      showWaitingRoom(msg.roomId);
      break;

    case 'joinedRoom':
      myPlayerId = msg.playerId;
      myRoomId = msg.roomId;
      localStorage.setItem('kobi_pid', myPlayerId);
      break;

    case 'playerJoined':
      showToast(`${msg.name} انضم! (${msg.count}/4)`);
      break;

    case 'playerDisconnected':
      showToast(`${msg.name} انقطع اتصاله`);
      break;

    case 'state':
      lastState = msg.state;
      myIndex = msg.state.myIndex;
      renderState(msg.state);
      break;

    case 'invalidPlay':
      showError(msg.msg);
      break;

    case 'error':
      showError(msg.msg);
      break;
  }
}

// ─── Screens ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Lobby ───
function createRoom() {
  const name = document.getElementById('player-name').value.trim() || 'لاعب';
  send({ type: 'createRoom', name });
}

function joinRoom() {
  const name = document.getElementById('player-name').value.trim() || 'لاعب';
  const roomId = document.getElementById('room-code').value.trim().toUpperCase();
  if (!roomId) { showError('أدخل كود الغرفة'); return; }
  send({ type: 'joinRoom', roomId, name, playerId: myPlayerId });
}

// ─── Waiting Room ───
function showWaitingRoom(roomId) {
  showScreen('waiting');
  document.getElementById('display-room-id').textContent = roomId;
  const url = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
  const waText = encodeURIComponent(`انضم معي في لعبة كوبي الليبية! 🃏\nكود الغرفة: ${roomId}\nاضغط الرابط: ${url}`);
  document.getElementById('whatsapp-link').href = `https://wa.me/?text=${waText}`;
}

function updateWaitingRoom(state) {
  if (!state) return;
  const realCount = state.players.filter(p => !p.isBot).length;
  document.getElementById('waiting-count').textContent = realCount;
  const grid = document.getElementById('waiting-players');
  grid.innerHTML = '';

  // Show real players first, then empty slots
  for (let i = 0; i < 4; i++) {
    const p = state.players[i];
    const slot = document.createElement('div');
    if (!p) {
      slot.className = 'player-slot';
      slot.innerHTML = `<div class="slot-icon">⌛</div><div>ينتظر...</div>`;
    } else if (p.isBot) {
      slot.className = 'player-slot bot-slot';
      slot.innerHTML = `<div class="slot-icon">🤖</div><div>${p.name}</div>`;
    } else {
      slot.className = 'player-slot filled';
      slot.innerHTML = `<div class="slot-icon">${i === myIndex ? '🙋' : '👤'}</div><div>${p.name}${i === myIndex ? ' (أنت)' : ''}</div>`;
    }
    grid.appendChild(slot);
  }

  // Show host controls only for host (index 0)
  const hostControls = document.getElementById('host-controls');
  if (myIndex === 0) {
    hostControls.style.display = 'block';
    const missing = 4 - realCount;
    const notice = document.getElementById('bot-notice');
    if (missing > 0) {
      notice.style.display = 'block';
      notice.textContent = `🤖 ${missing} مقعد فارغ — سيملأه بوتات عند البدء`;
    } else {
      notice.style.display = 'none';
    }
  } else {
    hostControls.style.display = 'none';
  }
}

// ─── Render State ───
function renderState(state) {
  // Route to correct screen
  if (state.phase === 'waiting') {
    showScreen('waiting');
    if (myRoomId) showWaitingRoom(myRoomId);
    updateWaitingRoom(state);
    return;
  }

  showScreen('game');

  // Header
  document.getElementById('lafa-badge').textContent = `اللفة ${state.lafa}`;
  const phaseNames = { playing: 'مرحلة اللعب', bidding: 'مرحلة الطلبات', summary: 'نتائج اللفة' };
  document.getElementById('phase-badge').textContent = phaseNames[state.phase] || '';

  // Scores
  renderScores(state);

  // Played cards on table
  renderTable(state);

  // Panels
  renderBidPanel(state);
  renderSummary(state);

  // Next trick button
  const ntb = document.getElementById('next-trick-btn');
  const showNT = state.phase === 'playing' && state.lastTrickResult && state.lastTrickResult.trick.length === 4;
  ntb.className = 'next-trick-btn' + (showNT ? ' visible' : '');

  // Player hand
  renderHand(state);

  // Action message
  renderActionMsg(state);

  // Event messages (majira)
  renderEvents(state);
}

function renderScores(state) {
  const bar = document.getElementById('scores-bar');
  bar.innerHTML = '';
  state.players.forEach((p, i) => {
    const chip = document.createElement('div');
    const isMe = i === myIndex;
    const isCurrent = state.currentPlayer === i && state.phase === 'playing';
    chip.className = 'score-chip' + (isMe ? ' my-chip' : '') + (isCurrent ? ' current-turn' : '');
    chip.id = `chip-${i}`;

    const ptsClass = p.score < 0 ? 'negative' : 'positive';
    const bidInfo = p.bid >= 0 ? `طلب: ${p.bid} | كسب: ${p.tricksTaken}` : (p.tricksTaken > 0 ? `كسب: ${p.tricksTaken}` : '');
    chip.innerHTML = `
      <div class="chip-name">${p.name}${isMe ? ' (أنت)' : ''}</div>
      <div class="chip-pts ${ptsClass}">${p.score}</div>
      <div class="chip-bid">${bidInfo}</div>
    `;
    bar.appendChild(chip);
  });
}

function renderTable(state) {
  const pc = document.getElementById('played-cards');
  pc.innerHTML = '';
  if (!state.currentTrick || state.currentTrick.length === 0) return;

  const winnerIdx = state.lastTrickResult?.winnerIdx;

  state.currentTrick.forEach(t => {
    const slot = document.createElement('div');
    const isWinner = state.lastTrickResult && winnerIdx === t.player && state.lastTrickResult.trick.length === 4;
    slot.className = 'played-slot' + (isWinner ? ' winner-slot' : '');

    const card = makeCard(t.card, false);
    const lbl = document.createElement('span');
    lbl.className = 'slot-name';
    lbl.textContent = state.players[t.player]?.name || '';

    slot.appendChild(card);
    slot.appendChild(lbl);
    pc.appendChild(slot);
  });
}

function renderBidPanel(state) {
  const panel = document.getElementById('bid-panel');
  const show = state.phase === 'bidding' && state.biddingPlayer === myIndex;
  panel.className = 'bid-panel' + (show ? ' visible' : '');

  if (!show) return;
  document.getElementById('bid-title').textContent = `اختر كم دار تريد`;
  const bb = document.getElementById('bid-buttons');
  bb.innerHTML = '';
  (state.allowedBids || []).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'bid-btn';
    btn.textContent = b;
    btn.onclick = () => send({ type: 'placeBid', bid: b });
    bb.appendChild(btn);
  });
}

function renderSummary(state) {
  const panel = document.getElementById('summary-panel');
  const show = state.phase === 'summary';
  panel.className = 'summary-panel' + (show ? ' visible' : '');

  if (!show) return;

  // Round changes — server sends roundChanges
  const rows = document.getElementById('summary-rows');
  rows.innerHTML = '';

  if (lastState?.roundChanges) {
    lastState.roundChanges.forEach(r => {
      const row = document.createElement('div');
      row.className = 'sum-row';
      const sign = r.delta >= 0 ? '+' : '';
      const cls = r.delta >= 0 ? 'pos' : 'neg';
      const bidInfo = state.lafa > 1 ? ` (طلب ${r.bid})` : '';
      row.innerHTML = `
        <span>${r.name}</span>
        <span style="color:var(--text-muted)">كسب: ${r.got}${bidInfo}</span>
        <span class="sum-delta ${cls}">${sign}${r.delta} → ${r.total}</span>
      `;
      rows.appendChild(row);
    });
  }

  // Game over
  const goArea = document.getElementById('game-over-area');
  goArea.innerHTML = '';
  if (state.gameOver) {
    goArea.innerHTML = `
      <div class="game-over-banner">
        <h2>🏆 الفائز: ${state.winnerName}</h2>
        ${state.loserName ? `<div style="color:#f87171;margin-top:4px;">${state.loserName} خرج من اللعبة</div>` : ''}
      </div>`;
    document.getElementById('next-round-btn').textContent = 'العب مرة جديدة';
  } else {
    document.getElementById('next-round-btn').textContent = 'اللفة التالية';
  }

  // Only host (index 0) shows next button
  document.getElementById('next-round-btn').style.display = myIndex === 0 ? 'block' : 'none';
  if (myIndex !== 0) {
    const waiting = document.createElement('div');
    waiting.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.85rem;margin-top:10px;';
    waiting.textContent = 'ننتظر صاحب الغرفة يبدأ اللفة التالية...';
    rows.appendChild(waiting);
  }
}

function renderHand(state) {
  const ph = document.getElementById('player-hand');
  ph.innerHTML = '';
  const myHand = state.myHand || [];
  const isMyTurn = state.phase === 'playing' && state.currentPlayer === myIndex;
  const hasTrick = state.lastTrickResult && state.lastTrickResult.trick.length === 4;

  myHand.forEach(c => {
    const valid = isMyTurn && !hasTrick && isValidPlay(myHand, c, state.currentTrick);
    const card = makeCard(c, valid && isMyTurn && !hasTrick);
    if (isMyTurn && !hasTrick && !valid) card.classList.add('disabled');
    if (!isMyTurn || hasTrick) card.classList.add('no-hover');
    if (valid && isMyTurn && !hasTrick) {
      card.onclick = () => send({ type: 'playCard', card: c });
    }
    // Highlight hearts
    if (c.suit === '♥') card.classList.add('heart-card');
    ph.appendChild(card);
  });
}

function renderActionMsg(state) {
  const msg = document.getElementById('action-msg');
  if (state.phase === 'bidding') {
    if (state.biddingPlayer === myIndex) {
      msg.textContent = 'دورك — اختر كم دار تريد';
    } else {
      msg.textContent = `${state.players[state.biddingPlayer]?.name} يختار...`;
    }
  } else if (state.phase === 'playing') {
    const hasTrick = state.lastTrickResult && state.lastTrickResult.trick.length === 4;
    if (hasTrick) {
      msg.textContent = `${state.lastTrickResult.winnerName} كسب الدار`;
    } else if (state.currentPlayer === myIndex) {
      msg.textContent = 'دورك — اختر ورقة للعب';
    } else {
      msg.textContent = `${state.players[state.currentPlayer]?.name} يلعب...`;
    }
  } else {
    msg.textContent = '';
  }
}

function renderEvents(state) {
  const evMsg = document.getElementById('event-msg');
  if (state.majiraEvent) {
    evMsg.className = 'event-msg majira';
    evMsg.textContent = `🃏 خنقة المجيرة! ${state.majiraEvent.killerName} +5 | ${state.majiraEvent.victimName} -5`;

    // Show "المجيره عنددددي" over victim's score chip for 10 seconds
    const victimIdx = state.majiraEvent.victimIdx;
    showMajiraAlert(victimIdx);
  } else {
    evMsg.className = 'event-msg';
    evMsg.textContent = '';
  }
}

function showMajiraAlert(playerIdx) {
  if (majiraTimers[playerIdx]) clearTimeout(majiraTimers[playerIdx]);
  // Remove old
  document.querySelectorAll('.majira-alert').forEach(el => el.remove());
  const chip = document.getElementById(`chip-${playerIdx}`);
  if (!chip) return;
  const alert = document.createElement('div');
  alert.className = 'majira-alert';
  alert.textContent = 'المجيره عنددددي 😱';
  chip.style.position = 'relative';
  chip.appendChild(alert);
  majiraTimers[playerIdx] = setTimeout(() => {
    alert.remove();
  }, 10000);
}

// ─── Helpers ───
function isValidPlay(hand, card, currentTrick) {
  if (!currentTrick || currentTrick.length === 0) return true;
  const leadSuit = currentTrick[0].card.suit;
  const hasSuit = hand.some(c => c.suit === leadSuit);
  if (hasSuit) return card.suit === leadSuit;
  const hasHeart = hand.some(c => c.suit === '♥');
  if (hasHeart) return card.suit === '♥';
  return true;
}

function makeCard(c, clickable) {
  const d = document.createElement('div');
  const isRed = c.suit === '♥' || c.suit === '♦';
  d.className = 'card-el ' + (isRed ? 'red' : 'black');

  const top = document.createElement('div'); top.className = 'c-rank'; top.textContent = c.rank;
  const mid = document.createElement('div'); mid.className = 'c-suit'; mid.textContent = c.suit;
  const bot = document.createElement('div'); bot.className = 'c-rank-b'; bot.textContent = c.rank;

  d.appendChild(top); d.appendChild(mid); d.appendChild(bot);
  return d;
}

function sendNextTrick() {
  send({ type: 'nextTrick' });
}

function sendNextRound() {
  send({ type: 'nextRound' });
}

function sendStartGame() {
  send({ type: 'startGame' });
}

function showToast(text) {
  const t = document.getElementById('trick-toast');
  t.textContent = text;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

function showError(text) {
  const t = document.getElementById('error-toast');
  t.textContent = text;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

// Room code input auto uppercase
document.getElementById('room-code').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});

// Enter key support
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const code = document.getElementById('room-code').value.trim();
    if (code) joinRoom(); else createRoom();
  }
});
</script>
